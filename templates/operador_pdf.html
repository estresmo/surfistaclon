<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reporte de Rifa</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f4f4;
      }

      .container {
        max-width: 600px; /* Ancho reducido para simular un ticket */
        margin: 20px auto;
        background: white;
        padding: 20px; /* Aumenté el padding para más espacio */
        border: 2px dashed #333; /* Borde estilo ticket */
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      h1 {
        color: #333;
        text-align: center;
        font-size: 1.5em; /* Aumenté el tamaño de la fuente */
        margin-bottom: 10px; /* Aumenté el margen */
      }

      .logo {
        display: block;
        margin: 0 auto 10px; /* Aumenté el margen */
        width: 80px;
        height: auto;
      }

      .header {
        text-align: center;
        margin-bottom: 15px; /* Aumenté el margen */
      }

      .foto {
        width: 300px; /* Aumenté el tamaño de la foto */
        height: 450px;
        object-fit: cover;
        border-radius: 5px;
        margin: 10px auto;
        display: block;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 15px; /* Aumenté el margen */
        font-size: 0.9em; /* Aumenté el tamaño de la fuente */
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 8px; /* Aumenté el padding */
        text-align: left;
      }

      th {
        background-color: #bbdefb;
        font-weight: bold;
      }

      h2 {
        color: #333;
        margin-top: 15px; /* Aumenté el margen */
        font-size: 1.2em; /* Aumenté el tamaño de la fuente */
      }

      .section {
        margin-bottom: 15px; /* Aumenté el margen */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img class="foto" src="data:image/png;base64,{{ foto }}" alt="Foto" />
        <h1>Rifa Una Cosa De Locos</h1>
        <img
          src="data:image/png;base64,{{ logo }}"
          alt="Logo de la Empresa"
          class="logo"
        />
      </div>

      <h2>Registro de Ticket</h2>
      <div class="operator-info">
        <div class="section">
          <table>
            <tr>
              <th>Nombre</th>
              <td>{{ comprobante.nombre }} {{ comprobante.apellido }}</td>
            </tr>
            <tr>
              <th>Teléfono</th>
              <td>{{ comprobante.telefono }}</td>
            </tr>
            <tr>
              <th>Fecha de Emisión</th>
              <td>{{ comprobante.fecha }}</td>
            </tr>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>

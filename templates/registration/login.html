{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio de Sesión</title>
    <link rel="shortcut icon" href="/static/img/logo.png" type="image/x-icon" />

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Arial", sans-serif;
        overflow: hidden; /* Evita el scroll por el video */
        display: flex; /* Usar flexbox */
        justify-content: center; /* Centrar horizontalmente */
        align-items: center; /* Centrar verticalmente */
        height: 100vh; /* Altura completa de la ventana */
      }

      .video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover; /* Asegura que el video cubra toda la pantalla */
        z-index: -1; /* Envía el video detrás del contenido */
      }

      .login-container {
        background: rgba(255, 255, 255, 0.9);
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        width: 300px;
        text-align: center;
        position: relative; /* Para que el contenedor esté por encima del video */
        z-index: 1; /* Asegura que el contenedor esté por encima del video */
      }

      .login-container h2 {
        margin-bottom: 1.5rem;
        color: #333;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #555;
      }

      .form-group input {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .btn {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 0.7rem;
        border-radius: 5px;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.3s;
      }

      .btn:hover {
        background-color: #0056b3;
      }

      .footer {
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #777;
      }
      .image-background {
        position: fixed; /* Fija la imagen en la pantalla */
        top: 0;
        left: 0;
        width: 100%; /* Ancho completo */
        height: 100%; /* Alto completo */
        object-fit: cover; /* Asegura que la imagen cubra toda el área */
        z-index: -1; /* Envía la imagen detrás de otros elementos */
      }
      body {
        background: linear-gradient(
          to right,
          #0f2027,
          #203a43,
          #2c5364
        ); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Iniciar Sesión</h2>
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <input type="hidden"
          name="next"
          value="{{ request.GET.next|default:'/admin/rifas' }}" />
        {% if form.errors %}
          <div class="error-messages">
            {% for field, errors in form.errors.items %}
              {% for error in errors %}
                <p>{{ error }}</p>
              {% endfor %}
            {% endfor %}
          </div>
        {% endif %}
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="btn">Iniciar Sesión</button>
      </form>
    </div>
  </body>
</html>

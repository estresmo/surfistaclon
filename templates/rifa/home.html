    <style>

      .wrapper {
        background-image: url("/static/img/loco2.jpeg");
        background-repeat: no-repeat; /* Evita que la imagen se repita */
        background-attachment: fixed; /* Fija la imagen para que no se desplace con el contenido */
        background-position: center; /* Centra la imagen horizontal y verticalmente */
        background-size: cover; /* Asegura que la imagen cubra todo el fondo, manteniendo su relación de aspecto */
        height: 100vh; /* Asegura que el contenedor tenga al menos la altura de la pantalla */
        width: 100%; /* Asegura que el contenedor ocupe todo el ancho */
        overflow: hidden; /* Evita que el contenido se desborde */
      }

      /* Media query para pantallas más pequeñas (teléfonos) */
      @media (max-width: 768px) {
        .wrapper {
          background-size: cover; /* Asegura que la imagen cubra todo el fondo */
          background-position: center; /* Mantiene la imagen centrada */
          height: 100vh; /* Mantiene la altura al 100% de la pantalla */
          padding: 0; /* Elimina el padding para ocupar toda la pantalla */
        }
      }
      .wrapper::after {
        background-color: #00000020;
      }
      .card,

    <script type="text/javascript">
      $("#buttfixed").on("click", function () {
        $("#linksfixed").toggle();
      });
      $(window).scroll(function () {
        if ($(this).scrollTop() > 20) {
          $("#navbar").addClass("header-scrolled");
        } else {
          $("#navbar").removeClass("header-scrolled");
        }
      });

      $("#navbarNav").on("click", "a", function () {
        $(".navbar-toggle").click();
      });
      $(".nav-item").on("click", "a", function () {
        $("#navbarNav").removeClass("show");
      });
      $(document).ready(function () {
        $("#owl-carousel-clients").owlCarousel({
          items: 3,
          loop: false,
          nav: true,
          autoplay: true,
          autoplayTimeout: 3000,
          autoplayHoverPause: true,
          responsiveClass: true,
          responsive: {
            0: {
              items: 1,
            },
            600: {
              items: 2,
            },
            1000: {
              items: 3,
            },
          },
        });
      });
      $(document).ready(function () {
        $("#owl-carousel-raffles").owlCarousel({
          items: 3,
          loop: false,
          nav: false,
          autoplay: false,
          autoplayTimeout: 3000,
          autoplayHoverPause: true,
          responsiveClass: true,
          responsive: {
            0: {
              items: 1,
            },
            600: {
              items: 2,
            },
            1000: {
              items: 3,
            },
          },
        });
      });

      function actionButtonAccounts(action_type, elemnt, text) {
        if (action_type == "copy") {
          $(elemnt).addClass("copied");
          setTimeout(function () {
            $(elemnt).removeClass("copied");
          }, 1200);
          var sampleTextarea = document.createElement("textarea");
          document.body.appendChild(sampleTextarea);
          sampleTextarea.value = text;
          // sampleTextarea.value = text.replace(/ /g,'');
          sampleTextarea.select();
          document.execCommand("copy");
          document.body.removeChild(sampleTextarea);
        } else if (action_type == "link") {
          window.open(text, "_blank").focus();
        }
      }
    </script>
